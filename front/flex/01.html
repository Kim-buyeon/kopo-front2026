<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap {
            background-color: gainsboro;
            width: 700px;
            height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: flex-start;
        }
        .wrap > div {
            color: white;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height: 100px;
        }
        .blue {
            background-color: #4967d8;
        }
        .red {
            background-color: #bc0d7c;
        }
        .green {
            background-color: #04ae3d;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="blue">
            A
        </div>
        <div class="red">
            B
        </div>
        <div class="green">
            C
        </div>
    </div>
</body>
</html>
