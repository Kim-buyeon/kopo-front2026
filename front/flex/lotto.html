<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f9f9f9;
        }
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 50px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo-area{
            display: flex;
            align-items: center;
            gap : 15px
        }
        nav{
            display: flex;
            gap : 20px;
            font-family: 0.9rem;
            color : #555;
        }
        main{
            display: flex;
            min-height: calc(100vh - 150px);
        }
        aside{
            flex: 1;
            background-color: #333;
            max-width: 150px;
        }
        article{
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-self: center;
            padding: 40px;
            text-align: center;
        }
        article img{
            max-width: 300px;
            min-height: 200px;
            height: auto;
            margin-bottom: 20px;
        }
        .description{
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 30px;
        }
        #lottoNumber {
            display: flex;
            justify-content: center;
            gap : 15px;
            margin: 30px 0;
            min-height: 60px;
        }
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 3px 3px 5px rgba(0,0,0,0.1);
            animation: bounceIn 0.4s ease-out forwards;
            opacity: 0;
        }
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: translateX(-50px) scale(0.3);
            }
            70% {
                opacity: 1;
                transform: translateX(10px) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .range-1 { background-color: #fbc400; }
        .range-11 { background-color: #69c8f2; }
        .range-21 { background-color: #ff7272; }
        .range-31 { background-color: #aaa; }
        .range-41 { background-color: #b0d840; }

        .btn-generate {
            padding: 15px 30px;
            font-size: 1rem;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .btn-generate:hover {
            background-color: #34495e;
            transform: scale(1.05);
        }

        footer{
            padding: 15px;
            text-align: center;
            background-color: #eee;
            color : #888;
            font-size: 0.8rem;
        }
        
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="./복 주머니.jpg" alt="복주머니" width="50" height="50">
            <h1>로또 마켓</h1>
        </div>
        <nav>
            <span>Home</span>
            <span>로그인</span>
            <span>회원가입</span>
        </nav>
    </header>
    <main>
        <aside>

        </aside>
        <article>
            <img src="./산신령.png" alt="산신령이미지">
            <p class="description"> 
                꿈속에서 조상님이 번호를 안 알려주셨다면? <br>여기서 직접 골라보세요!
            </p>
            <div id="lottoNumber"></div>
            <input type="button" value="조상님이 못다 한 말, 내가 이 번호들에 숨겨두었느니라" onclick="getLotto()" class="btn-generate">
        </article>
        <aside>

        </aside>
    </main>
    <footer>
        제작자 : 김부연
    </footer>
</body>
<script>
    function getLotto(){
        let lotto = []
        while(lotto.length < 6){
            let num = Math.floor(Math.random() * 45) + 1
            if(!lotto.includes(num)){
                lotto.push(num)
            }
        }
        const container = document.getElementById('lottoNumber')
        container.innerHTML=""
        lotto.forEach(num =>{
            const ball = document.createElement('span')
            ball.classList.add('ball')
            ball.innerText = num
            if (num <= 10) ball.classList.add('range-1');
            else if (num <= 20) ball.classList.add('range-11');
            else if (num <= 30) ball.classList.add('range-21');
            else if (num <= 40) ball.classList.add('range-31');
            else ball.classList.add('range-41');
            container.appendChild(ball);
        })
    }
    
</script>
</html>
